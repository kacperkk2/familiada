<div class="page-panel">
  <app-breadcrumb
    [items]="editId
      ? [{label: 'Gry', route: ['/games']}, {label: editGameName ?? '…', route: ['/games', editId]}, {label: 'Edycja'}]
      : [{label: 'Gry', route: ['/games']}, {label: 'Nowa gra'}]"
  />
  <form [formGroup]="form" (ngSubmit)="onSave()">

    <div class="form-header">
      <input class="title-input" formControlName="name" placeholder="Nazwa gry…" />
      <div class="header-actions">
        <a [routerLink]="editId ? ['/games', editId] : ['/games']" class="btn-small">Anuluj</a>
        <button type="submit" class="btn-save" [disabled]="form.invalid">
          {{ editId ? 'Zapisz zmiany' : 'Zapisz grę' }}
        </button>
      </div>
    </div>

    <div formArrayName="rounds">
      <div *ngFor="let round of rounds.controls; let ri = index" [formGroupName]="ri" class="round-section">

        <div class="round-header">
          <p class="round-label">Runda {{ ri + 1 }}</p>
          <div class="round-actions">
            <button type="button" class="btn-move-round" (click)="moveRound(ri, -1)" [disabled]="ri === 0" title="Przesuń w górę">▲</button>
            <button type="button" class="btn-move-round" (click)="moveRound(ri, 1)" [disabled]="ri === rounds.length - 1" title="Przesuń w dół">▼</button>
            <button type="button" class="btn-remove-round" (click)="removeRound(ri)" [disabled]="rounds.length === 1">
              Usuń rundę
            </button>
          </div>
        </div>

        <input type="text" formControlName="question" placeholder="Treść pytania…" class="question-input" />

        <div formArrayName="answers">
          <div *ngFor="let answer of getAnswers(ri).controls; let ai = index" [formGroupName]="ai" class="answer-item">
            <input type="text" formControlName="text" placeholder="Odpowiedź" class="answer-input" />
            <input type="number" formControlName="points" placeholder="0" class="points-input" min="0" />
            <button type="button" class="btn-remove-answer" (click)="removeAnswer(ri, ai)" [disabled]="getAnswers(ri).length === 1">✕</button>
          </div>
        </div>

        <button type="button" class="btn-add-answer" (click)="addAnswer(ri)">Dodaj odpowiedź</button>
      </div>
    </div>

    <button type="button" class="btn-add-round" (click)="addRound()">Dodaj rundę</button>

  </form>
</div>
