<div class="page-panel" [style.zoom]="zoom">
  <app-breadcrumb
    *ngIf="game$ | async as game"
    [items]="[{label: 'Gry', route: ['/games']}, {label: game.name, route: ['/games', gameId]}, {label: 'Panel prowadzД…cego'}]"
  />
  <div class="admin-header">
    <div class="title-with-back">
      <a [routerLink]="['/games', gameId]" class="btn-back" title="PowrГіt do szczegГіЕ‚Гіw gry"><span class="material-icons">chevron_left</span></a>
      <h1 class="admin-title">{{ (game$ | async)?.name }}</h1>
    </div>
    <div class="header-actions">
      <a href="/familiada/play/{{ gameId }}" target="_blank" class="btn-small">Widok graczy</a>
    </div>
  </div>

  <div class="sound-buttons">
    <button class="btn-sound" (click)="onPlayIntro()">
      <span class="material-icons">volume_up</span> Intro
    </button>
    <button class="btn-sound" (click)="toggleSound()" [title]="soundEnabled ? 'Wycisz dЕєwiД™ki' : 'WЕ‚Д…cz dЕєwiД™ki'">
      <span class="material-icons">{{ soundEnabled ? 'volume_up' : 'volume_off' }}</span> DЕєwiД™k
    </button>
    <div class="sound-buttons-right">
      <button class="btn-small" (click)="decreaseZoom()"><span class="material-icons">zoom_out</span></button>
      <span class="zoom-label">{{ (zoom * 100).toFixed(0) }}%</span>
      <button class="btn-small" (click)="increaseZoom()"><span class="material-icons">zoom_in</span></button>
    </div>
  </div>
  <hr class="section-divider">

  <div class="round-buttons" *ngIf="game$ | async as game">
    <button
      *ngFor="let round of game.rounds; let i = index"
      (click)="onStartRound(i)"
      [class.btn-round-active]="(currentRoundIndex$ | async) === i"
      [class.btn-round-inactive]="(currentRoundIndex$ | async) !== i"
      class="btn-round"
    >
      Runda {{ i + 1 }}
    </button>
  </div>

  <ng-container *ngIf="currentRound$ | async as round">
    <ng-container *ngIf="{ revealed: (revealedQuestion$ | async)!, answers: (revealedAnswers$ | async)! } as vm">

      <div class="round-section">
        <div class="question-row" (click)="onToggleQuestion(vm.revealed)" [class.revealed]="vm.revealed">
          <span class="question-text">{{ round.question }}</span>
        </div>
      </div>

      <div class="round-section">
        <div
          *ngFor="let answer of round.answers; let i = index"
          class="answer-row"
          [class.revealed]="vm.answers.includes(answer.id)"
          (click)="onToggleAnswer(answer.id, answer.points, vm.answers.includes(answer.id))"
        >
          <span class="answer-text">{{ answer.text }}</span>
          <span class="answer-points">{{ answer.points }}</span>
        </div>
      </div>

    </ng-container>
  </ng-container>

  <div class="teams-panel">
  <div class="round-section"
       *ngIf="{ p: (penaltyPoints$ | async)!, n: (teamNames$ | async)! } as vm">
    <div class="penalties-layout">
      <div class="penalty-team">
        <div class="penalty-control">
          <button class="btn-small" (click)="onAddPenalty(displayedIndices[0])"
                  [disabled]="vm.p[displayedIndices[0]] === 3">+</button>
          <div class="x-marks-row">
            <button class="btn-small" (click)="onRemovePenalty(displayedIndices[0])"
                    [disabled]="vm.p[displayedIndices[0]] === 0">в€’</button>
            <span class="x-mark" [class.x-mark--active]="vm.p[displayedIndices[0]] > 0">вњ•</span>
            <span class="x-mark" [class.x-mark--active]="vm.p[displayedIndices[0]] > 1">вњ•</span>
            <span class="x-mark" [class.x-mark--active]="vm.p[displayedIndices[0]] > 2">вњ•</span>
          </div>
        </div>
      </div>
      <div class="penalty-team penalty-team--right">
        <div class="penalty-control">
          <button class="btn-small" (click)="onAddPenalty(displayedIndices[1])"
                  [disabled]="vm.p[displayedIndices[1]] === 3">+</button>
          <div class="x-marks-row">
            <span class="x-mark" [class.x-mark--active]="vm.p[displayedIndices[1]] > 0">вњ•</span>
            <span class="x-mark" [class.x-mark--active]="vm.p[displayedIndices[1]] > 1">вњ•</span>
            <span class="x-mark" [class.x-mark--active]="vm.p[displayedIndices[1]] > 2">вњ•</span>
            <button class="btn-small" (click)="onRemovePenalty(displayedIndices[1])"
                    [disabled]="vm.p[displayedIndices[1]] === 0">в€’</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="round-section">
    <div class="teams-layout"
         *ngIf="{ n: (teamNames$ | async)!, p: (penaltyPoints$ | async)!, s: (teamScores$ | async)!, pool: (roundPool$ | async)! } as vm">

      <!-- row 1: names + swap -->
      <input class="team-name-input"
             [value]="vm.n[displayedIndices[0]]"
             #nameInputL
             (blur)="onSetTeamName(displayedIndices[0], nameInputL.value)"
             (keydown.enter)="onSetTeamName(displayedIndices[0], nameInputL.value); nameInputL.blur()"
             placeholder="Nazwa druЕјyny" />
      <span></span>
      <button class="btn-swap" (click)="swapTeams()" title="ZamieЕ„ strony">в‡„</button>
      <span></span>
      <input class="team-name-input"
             [value]="vm.n[displayedIndices[1]]"
             #nameInputR
             (blur)="onSetTeamName(displayedIndices[1], nameInputR.value)"
             (keydown.enter)="onSetTeamName(displayedIndices[1], nameInputR.value); nameInputR.blur()"
             placeholder="Nazwa druЕјyny" />

      <!-- row 2: scores + award buttons + pool -->
      <input class="team-score-input"
             type="number"
             [value]="vm.s[displayedIndices[0]]"
             #scoreInputL
             (blur)="onSetTeamScore(displayedIndices[0], scoreInputL.value)"
             (keydown.enter)="onSetTeamScore(displayedIndices[0], scoreInputL.value); scoreInputL.blur()"
             min="0" />
      <button class="btn-award"
              (click)="onAwardPool(displayedIndices[0])"
              [disabled]="!vm.pool"
              title="Przyznaj lewej druЕјynie">в—„</button>
      <div class="pool-box">
        <span class="pool-label">Pula rundy</span>
        <span class="pool-value">{{ vm.pool }}</span>
      </div>
      <button class="btn-award"
              (click)="onAwardPool(displayedIndices[1])"
              [disabled]="!vm.pool"
              title="Przyznaj prawej druЕјynie">в–є</button>
      <input class="team-score-input"
             type="number"
             [value]="vm.s[displayedIndices[1]]"
             #scoreInputR
             (blur)="onSetTeamScore(displayedIndices[1], scoreInputR.value)"
             (keydown.enter)="onSetTeamScore(displayedIndices[1], scoreInputR.value); scoreInputR.blur()"
             min="0" />

    </div>
  </div>
  </div>


</div>
