<div class="page-panel">
  <div class="admin-header">
    <h1 class="admin-title">{{ (game$ | async)?.name }}</h1>
    <div class="header-actions">
      <a [routerLink]="['/games', gameId]" class="btn-small">Powrót</a>
      <a href="/play/{{ gameId }}" target="_blank" class="btn-small">Widok graczy</a>
    </div>
  </div>

  <div class="round-buttons" *ngIf="game$ | async as game">
    <button
      *ngFor="let round of game.rounds; let i = index"
      (click)="onStartRound(i)"
      [class.btn-round-active]="(currentRoundIndex$ | async) === i"
      [class.btn-round-inactive]="(currentRoundIndex$ | async) !== i"
      class="btn-round"
    >
      Runda {{ i + 1 }}
    </button>
  </div>

  <ng-container *ngIf="currentRound$ | async as round">
    <ng-container *ngIf="{ revealed: (revealedQuestion$ | async)!, answers: (revealedAnswers$ | async)! } as vm">

      <div class="round-section">
        <div class="question-row" (click)="onToggleQuestion(vm.revealed)" [class.revealed]="vm.revealed">
          <span class="question-text">{{ round.question }}</span>
        </div>
      </div>

      <div class="round-section">
        <div
          *ngFor="let answer of round.answers; let i = index"
          class="answer-row"
          [class.revealed]="vm.answers.includes(answer.id)"
          (click)="onToggleAnswer(answer.id, answer.points, vm.answers.includes(answer.id))"
        >
          <span class="answer-text">{{ answer.text }}</span>
          <span class="answer-points">{{ answer.points }}</span>
        </div>
      </div>

    </ng-container>
  </ng-container>

  <div class="round-section">
    <div class="teams-layout"
         *ngIf="{ n: (teamNames$ | async)!, p: (penaltyPoints$ | async)!, s: (teamScores$ | async)!, pool: (roundPool$ | async)! } as vm">

      <div class="team-control">
        <label class="team-label">Drużyna {{ displayedIndices[0] + 1 }}</label>
        <input class="team-name-input"
               [value]="vm.n[displayedIndices[0]]"
               #nameInputL
               (blur)="onSetTeamName(displayedIndices[0], nameInputL.value)"
               (keydown.enter)="onSetTeamName(displayedIndices[0], nameInputL.value); nameInputL.blur()"
               placeholder="Nazwa drużyny" />
        <div class="penalty-control">
          <span class="penalty-label">Błędy: {{ vm.p[displayedIndices[0]] }}/3</span>
          <button class="btn-small" (click)="onRemovePenalty(displayedIndices[0])"
                  [disabled]="vm.p[displayedIndices[0]] === 0">−</button>
          <button class="btn-small" (click)="onAddPenalty(displayedIndices[0])"
                  [disabled]="vm.p[displayedIndices[0]] === 3">+</button>
        </div>
        <input class="team-score-input"
               type="number"
               [value]="vm.s[displayedIndices[0]]"
               #scoreInputL
               (blur)="onSetTeamScore(displayedIndices[0], scoreInputL.value)"
               (keydown.enter)="onSetTeamScore(displayedIndices[0], scoreInputL.value); scoreInputL.blur()"
               min="0" />
      </div>

      <div class="teams-middle">
        <button class="btn-swap" (click)="swapTeams()" title="Zamień strony">⇄</button>
        <div class="pool-box">
          <span class="pool-label">Pula rundy</span>
          <span class="pool-value">{{ vm.pool }} pkt</span>
          <div class="pool-award-buttons">
            <button class="btn-award"
                    (click)="onAwardPool(displayedIndices[0])"
                    [disabled]="!vm.pool"
                    title="Przyznaj lewej drużynie">◄</button>
            <button class="btn-award"
                    (click)="onAwardPool(displayedIndices[1])"
                    [disabled]="!vm.pool"
                    title="Przyznaj prawej drużynie">►</button>
          </div>
        </div>
      </div>

      <div class="team-control">
        <label class="team-label">Drużyna {{ displayedIndices[1] + 1 }}</label>
        <input class="team-name-input"
               [value]="vm.n[displayedIndices[1]]"
               #nameInputR
               (blur)="onSetTeamName(displayedIndices[1], nameInputR.value)"
               (keydown.enter)="onSetTeamName(displayedIndices[1], nameInputR.value); nameInputR.blur()"
               placeholder="Nazwa drużyny" />
        <div class="penalty-control">
          <span class="penalty-label">Błędy: {{ vm.p[displayedIndices[1]] }}/3</span>
          <button class="btn-small" (click)="onRemovePenalty(displayedIndices[1])"
                  [disabled]="vm.p[displayedIndices[1]] === 0">−</button>
          <button class="btn-small" (click)="onAddPenalty(displayedIndices[1])"
                  [disabled]="vm.p[displayedIndices[1]] === 3">+</button>
        </div>
        <input class="team-score-input"
               type="number"
               [value]="vm.s[displayedIndices[1]]"
               #scoreInputR
               (blur)="onSetTeamScore(displayedIndices[1], scoreInputR.value)"
               (keydown.enter)="onSetTeamScore(displayedIndices[1], scoreInputR.value); scoreInputR.blur()"
               min="0" />
      </div>

    </div>
  </div>


</div>
